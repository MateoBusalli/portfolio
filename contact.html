<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Matéo Busalli - Contact">
    <title data-i18n="contact">Contact</title>
    <link rel="stylesheet" href="./css/main.css">
    <link rel="icon" href="./images/favicon.ico" type="image/x-icon">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo">
                <span>Intelligence Notice</span>
            </a>
            <nav class="nav">
                <a href="index.html" data-i18n="home">Home</a>
                <a href="candidate.html" data-i18n="profile">Profile</a>
                <a href="contact.html" data-i18n="contact">Contact</a>
                <button id="lang-toggle" class="lang-toggle" onclick="i18n.toggleLanguage()">FR</button>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container container-narrow">
        <section class="section">
            <div class="form">
                <h2 class="section-title" data-i18n="contactTitle">Job Opportunity Form</h2>
                <p class="card-text" style="margin-bottom: 2rem;" data-i18n="contactSubtitle">Please fill out this form to propose a job opportunity</p>

                <form action="https://formspree.io/f/mkgqyobr" method="POST">
                    <div class="form-group">
                        <label class="form-label" for="recruiter-email">
                            <span data-i18n="recruiterEmail">Recruiter Email</span>
                            <span class="form-required">*</span>
                        </label>
                        <input type="email" id="recruiter-email" name="recruiter_email" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="company-name">
                            <span data-i18n="companyName">Company Name</span>
                            <span class="form-required">*</span>
                        </label>
                        <input type="text" id="company-name" name="company_name" class="form-input" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="message">
                            <span data-i18n="message">Message</span>
                        </label>
                        <textarea id="message" name="message" class="form-textarea"></textarea>
                    </div>

                    <button type="submit" class="btn btn-block" data-i18n="submit">Send Opportunity</button>
                </form>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <span class="footer-prompt">mateo@portfolio:~$&nbsp;</span>
            <span class="footer-item"><span class="footer-key" data-i18n="footerStatus">STATUS</span>: <span class="footer-val" data-i18n="footerStatusVal">OPEN TO WORK</span></span>
            <span class="footer-sep">//</span>
            <span class="footer-item"><span class="footer-key" data-i18n="footerLocation">LOCATION</span>: <span class="footer-val">NICE, FRANCE</span></span>
            <span class="footer-sep">//</span>
            <span class="footer-item"><span class="footer-key" data-i18n="footerYear">YEAR</span>: <span class="footer-val">2026</span></span>
            <span class="footer-cursor">_</span>
        </div>
    </footer>

    <script src="./js/i18n.js"></script>
</body>
</html>
